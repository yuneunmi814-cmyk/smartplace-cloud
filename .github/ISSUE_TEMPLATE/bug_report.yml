name: 버그 제보 (Bug report)
description: 동작이 잘못됐나요? 재현 방법을 알려주세요 / Report something broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        제보 감사합니다 재현 방법이 자세할수록 빨리 고칠 수 있어요.
        _Thanks! The more detail, the faster we can fix it._
  - type: input
    id: env
    attributes:
      label: 환경 (Environment)
      description: OS와 버전 / OS and version
      placeholder: "예: Windows 11 · v0.1.1-beta  (또는 source main)"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 어디서 발생했나요? (Which part?)
      options:
        - desktop (데스크톱 앱)
        - backend (FastAPI)
        - gateway (CLI 자동화)
        - web (관리 콘솔)
        - 기타/모르겠음 (other/unsure)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계 (Steps to reproduce)
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 결과 (Expected)
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과 (Actual)
      description: 에러 메시지·로그·스크린샷이 있으면 붙여주세요 / paste errors, logs, screenshots
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 확인 (Confirm)
      options:
        - label: 본인이 소유·관리하는 매장에서 발생한 문제입니다 / This happened on a store I own or operate
          required: true
        - label: "`.env`·비밀번호·세션 쿠키 등 민감정보를 본문에 넣지 않았습니다 / I did not paste secrets"
          required: true
