<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>79대포 사진관리</title>
    <style>
      :root {
        --green: #2db400; --green-d: #259700; --bg: #f5f7fa; --card: #fff;
        --border: #e2e6ee; --text: #1c2230; --muted: #6b7385; --danger: #d64564;
        font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); }
      header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; }
      header h1 { margin: 0; font-size: 18px; }
      header p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
      main { padding: 20px 24px; max-width: 860px; margin: 0 auto; }
      .step { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
        padding: 20px; margin-bottom: 16px; }
      .step.disabled { opacity: 0.45; pointer-events: none; }
      .step h2 { margin: 0 0 12px; font-size: 16px; }
      .badge { font-size: 12px; padding: 2px 10px; border-radius: 999px; margin-left: 8px; }
      .badge.ok { background: #e6f6e0; color: var(--green-d); }
      .badge.no { background: #fdecef; color: var(--danger); }
      button { font-family: inherit; cursor: pointer; border-radius: 9px; font-size: 14px; }
      .btn { background: var(--green); color: #fff; border: none; padding: 11px 20px; }
      .btn:hover { background: var(--green-d); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-ghost { background: #fff; border: 1px solid var(--border); padding: 6px 12px; font-size: 13px; }
      input[type=text] { border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
        font-size: 14px; width: 160px; }
      .muted { color: var(--muted); font-size: 13px; }
      .error { color: var(--danger); font-size: 13px; }
      .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .list { max-height: 240px; overflow-y: auto; border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 12px; margin-top: 10px; }
      .list label { display: flex; gap: 8px; align-items: center; font-size: 14px; padding: 4px 0; }
      .progress { height: 14px; background: #eef1f5; border-radius: 999px; overflow: hidden; margin: 14px 0 8px; }
      .progress > div { height: 100%; background: var(--green); width: 0; transition: width .3s; }
      .log { max-height: 200px; overflow-y: auto; font-size: 13px; font-family: ui-monospace, monospace;
        border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-top: 8px; }
      .log .ok { color: var(--green-d); } .log .fail { color: var(--danger); }
      .folder { font-size: 13px; color: var(--muted); word-break: break-all; }
    </style>
  </head>
  <body>
    <header>
      <h1>📷 79대포 사진관리 <span class="muted" style="font-size:12px">베타</span></h1>
      <p>네이버 로그인 → 지점 자동 불러오기 → 이미지 일괄 등록</p>
    </header>
    <main>
      <!-- Step 1: 로그인 -->
      <section class="step" id="s1">
        <h2>1. 네이버 로그인 <span id="loginBadge" class="badge no">로그인 필요</span></h2>
        <p class="muted">아래 버튼을 누르면 네이버 로그인 창이 떠요. 직접 로그인하세요 (캡차·2차인증 포함).</p>
        <button class="btn" id="loginBtn" onclick="doLogin()">네이버 로그인</button>
      </section>

      <!-- Step 2: 지점 불러오기 -->
      <section class="step disabled" id="s2">
        <h2>2. 지점 불러오기</h2>
        <div class="row">
          <span class="muted">브랜드 번호(brandSeq)</span>
          <input type="text" id="brandSeq" value="6707" />
          <button class="btn-ghost" onclick="doScrape()">지점 불러오기</button>
          <span id="scrapeMsg" class="muted"></span>
        </div>
        <div class="row" id="branchTools" style="margin-top:10px; display:none">
          <button class="btn-ghost" onclick="selectAll(true)">전체 선택</button>
          <button class="btn-ghost" onclick="selectAll(false)">전체 해제</button>
          <span id="selCount" class="muted"></span>
        </div>
        <div class="list" id="branchList" style="display:none"></div>
      </section>

      <!-- Step 3: 작업 선택 -->
      <section class="step disabled" id="s3">
        <h2>3. 작업 선택</h2>
        <div class="row">
          <label class="check"><input type="radio" name="mode" value="photo" checked onchange="setMode('photo')"> 대표사진 일괄</label>
          <label class="check"><input type="radio" name="mode" value="menu" onchange="setMode('menu')"> 메뉴 일괄</label>
        </div>
        <div id="photoBox" style="margin-top:14px">
          <button class="btn-ghost" onclick="pickFolder()">이미지 폴더 선택</button>
          <span id="folder" class="folder"></span>
        </div>
        <div id="menuBox" style="margin-top:14px; display:none">
          <button class="btn-ghost" onclick="pickCsv()">메뉴 CSV 선택</button>
          <span id="csv" class="folder"></span>
          <div style="margin-top:8px">
            <button class="btn-ghost" onclick="pickMenuImg()">메뉴 이미지 폴더 (선택)</button>
            <span id="menuImg" class="folder"></span>
          </div>
          <label class="check" style="margin-top:10px">
            <input type="checkbox" id="replaceChk"> 기존 메뉴 삭제 후 통일(교체) ⚠️
          </label>
        </div>
      </section>

      <!-- Step 4: 실행 -->
      <section class="step disabled" id="s4">
        <h2>4. 일괄 실행</h2>
        <button class="btn" id="runBtn" onclick="doApply()">실행</button>
        <div class="progress" id="progWrap" style="display:none"><div id="progBar"></div></div>
        <div id="progText" class="muted"></div>
        <div class="log" id="log" style="display:none"></div>
      </section>
    </main>

    <script>
      let branches = [];
      let folder = null;
      let mode = 'photo', csvPath = null, menuImgDir = null;
      const api = () => window.pywebview.api;

      function setMode(m) {
        mode = m;
        document.getElementById('photoBox').style.display = m === 'photo' ? 'block' : 'none';
        document.getElementById('menuBox').style.display = m === 'menu' ? 'block' : 'none';
      }

      async function init() {
        const r = await api().has_session();
        if (r.ok) setLoggedIn();
      }
      function setLoggedIn() {
        document.getElementById('loginBadge').className = 'badge ok';
        document.getElementById('loginBadge').textContent = '로그인됨';
        document.getElementById('s2').classList.remove('disabled');
      }
      async function doLogin() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.textContent = '로그인 창에서 진행하세요…';
        const r = await api().login();
        btn.disabled = false; btn.textContent = '네이버 로그인';
        if (r.ok) setLoggedIn();
        else alert('로그인 확인 실패: 스마트플레이스까지 들어간 뒤 다시 시도하세요.' + (r.error ? '\n' + r.error : ''));
      }

      async function doScrape() {
        const msg = document.getElementById('scrapeMsg');
        msg.textContent = '불러오는 중… (1~2분)';
        const r = await api().scrape(document.getElementById('brandSeq').value);
        if (r.error) { msg.innerHTML = '<span class="error">' + r.error + '</span>'; return; }
        branches = r.branches || [];
        msg.textContent = branches.length + '곳 불러옴';
        renderBranches();
        document.getElementById('s3').classList.remove('disabled');
      }
      function renderBranches() {
        const list = document.getElementById('branchList');
        list.style.display = 'block';
        document.getElementById('branchTools').style.display = 'flex';
        list.innerHTML = branches.map((b, i) =>
          `<label><input type="checkbox" class="bchk" data-seq="${b.placeSeq}" checked onchange="updateCount()"> ${b.name || ('지점 ' + b.placeSeq)} <span class="muted">(${b.placeSeq})</span></label>`
        ).join('');
        updateCount();
      }
      function selectAll(v) { document.querySelectorAll('.bchk').forEach(c => c.checked = v); updateCount(); }
      function selected() { return [...document.querySelectorAll('.bchk:checked')].map(c => c.dataset.seq); }
      function updateCount() { document.getElementById('selCount').textContent = selected().length + '곳 선택'; }

      async function pickFolder() {
        const r = await api().pick_folder();
        if (r.folder) {
          folder = r.folder;
          document.getElementById('folder').textContent = '  ' + folder;
          document.getElementById('s4').classList.remove('disabled');
        }
      }
      async function pickCsv() {
        const r = await api().pick_csv();
        if (r.path) {
          csvPath = r.path;
          document.getElementById('csv').textContent = '  ' + csvPath;
          document.getElementById('s4').classList.remove('disabled');
        }
      }
      async function pickMenuImg() {
        const r = await api().pick_folder();
        if (r.folder) {
          menuImgDir = r.folder;
          document.getElementById('menuImg').textContent = '  ' + menuImgDir;
        }
      }

      function startRunUI() {
        document.getElementById('runBtn').disabled = true;
        document.getElementById('progWrap').style.display = 'block';
        document.getElementById('log').style.display = 'block';
        document.getElementById('log').innerHTML = '';
      }

      async function doApply() {
        const seqs = selected();
        if (!seqs.length) { alert('지점을 선택하세요'); return; }
        const brand = document.getElementById('brandSeq').value;
        if (mode === 'photo') {
          if (!folder) { alert('이미지 폴더를 선택하세요'); return; }
          if (!confirm(seqs.length + '곳에 대표사진을 등록합니다. 계속할까요?')) return;
          startRunUI();
          await api().apply(brand, seqs, folder);
        } else {
          if (!csvPath) { alert('메뉴 CSV를 선택하세요'); return; }
          const replace = document.getElementById('replaceChk').checked;
          const msg = replace
            ? seqs.length + '곳의 기존 메뉴를 삭제하고 표준 메뉴로 통일합니다. 계속할까요?'
            : seqs.length + '곳에 표준 메뉴를 추가합니다. 계속할까요?';
          if (!confirm(msg)) return;
          startRunUI();
          await api().apply_menu(brand, seqs, csvPath, menuImgDir || '', replace);
        }
      }

      window.onProgress = (done, total, ps, ok, err) => {
        document.getElementById('progBar').style.width = (done / total * 100) + '%';
        document.getElementById('progText').textContent = `${done} / ${total} 처리 중…`;
        const log = document.getElementById('log');
        const cls = ok ? 'ok' : 'fail';
        const mark = ok ? '✅' : '❌';
        log.innerHTML += `<div class="${cls}">${mark} ${ps} ${err ? '— ' + err : ''}</div>`;
        log.scrollTop = log.scrollHeight;
      };
      window.onDone = (res) => {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('progText').innerHTML =
          `<b>완료!</b> 성공 ${res.ok} / 실패 ${res.fail.length} (이미지 ${res.images}장)`;
      };
      window.onError = (msg) => {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('progText').innerHTML = '<span class="error">오류: ' + msg + '</span>';
      };

      window.addEventListener('pywebviewready', init);
    </script>
  </body>
</html>
